<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Primary SEO -->
		<title>HireForge — AI Resume Builder with ATS Score & Interview Prep</title>
		<meta name="description" content="Build ATS-optimized resumes, write tailored cover letters, and practice job interviews with AI. HireForge is a free, open-source, self-hosted AI job application toolkit." />
		<meta name="keywords" content="AI resume builder, ATS score, ATS resume, interview preparation, cover letter generator, job application tracker, open source resume builder" />
		<meta name="author" content="HireForge" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://jobs.bizlocal.ca/" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://jobs.bizlocal.ca/" />
		<meta property="og:title" content="HireForge — AI Resume Builder with ATS Score & Interview Prep" />
		<meta property="og:description" content="Build ATS-optimized resumes, write tailored cover letters, and practice job interviews with AI. Free, open-source, self-hosted." />
		<meta property="og:site_name" content="HireForge" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="HireForge — AI Resume Builder with ATS Score & Interview Prep" />
		<meta name="twitter:description" content="Build ATS-optimized resumes, practice interviews, and track job applications with AI. Free & open-source." />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
